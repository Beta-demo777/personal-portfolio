server_tokens off;

log_format portfolio_json escape=json
    '{"time":"$time_iso8601","request_id":"$request_id",'
    '"remote_addr":"$remote_addr","host":"$host","method":"$request_method",'
    '"uri":"$uri","status":$status,"bytes":$body_bytes_sent,'
    '"request_time":$request_time,"upstream_time":"$upstream_response_time",'
    '"user_agent":"$http_user_agent"}';

gzip on;
gzip_vary on;
gzip_min_length 1024;
gzip_types application/javascript application/json application/manifest+json application/xml image/svg+xml text/css text/plain;

ssl_protocols TLSv1.2 TLSv1.3;
ssl_session_cache shared:portfolio_tls:10m;
ssl_session_timeout 1d;
ssl_session_tickets off;

resolver 127.0.0.11 valid=10s ipv6=off;
resolver_timeout 5s;

upstream portfolio_frontend {
    zone portfolio_frontend 64k;
    server frontend:3000 resolve;
}

upstream portfolio_backend {
    zone portfolio_backend 64k;
    server backend:8000 resolve;
}

limit_req_zone $binary_remote_addr zone=portfolio_ai_chat:10m rate=6r/m;
limit_req_zone $binary_remote_addr zone=portfolio_admin_login:10m rate=5r/m;
limit_conn_zone $hostname zone=portfolio_global_connections:1m;
limit_conn_zone $binary_remote_addr zone=portfolio_per_ip_connections:1m;
limit_conn_zone $hostname zone=portfolio_large_body_global:1m;
limit_conn_zone $binary_remote_addr zone=portfolio_large_body_per_ip:1m;

limit_conn portfolio_global_connections 128;
limit_conn portfolio_per_ip_connections 32;
limit_conn_status 429;
limit_conn_log_level warn;

server {
    listen 80 default_server;
    server_name _;
    access_log /var/log/nginx/access.log portfolio_json;

    add_header X-Request-ID $request_id always;

    return 444;
}

server {
    listen 80;
    server_name beta-demo.top;
    access_log /var/log/nginx/access.log portfolio_json;

    add_header X-Request-ID $request_id always;

    return 301 https://beta-demo.top$request_uri;
}

server {
    listen 80;
    server_name www.beta-demo.top;
    access_log /var/log/nginx/access.log portfolio_json;

    add_header X-Request-ID $request_id always;

    return 301 https://www.beta-demo.top$request_uri;
}

server {
    listen 443 ssl default_server;
    server_name _;
    ssl_reject_handshake on;
}

server {
    listen 443 ssl;
    server_name beta-demo.top;
    client_max_body_size 64k;
    access_log /var/log/nginx/access.log portfolio_json;

    ssl_certificate /etc/nginx/certs/beta-demo.top.pem;
    ssl_certificate_key /etc/nginx/certs/beta-demo.top.key;

    limit_req_status 429;
    limit_req_log_level warn;

    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "accelerometer=(), autoplay=(), camera=(), display-capture=(), encrypted-media=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Request-ID $request_id always;
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'self'; form-action 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self'; frame-src 'self'; manifest-src 'self'; worker-src 'self' blob:" always;

    location ^~ /api/agent/chat {
        client_max_body_size 64k;
        limit_req zone=portfolio_ai_chat burst=3 nodelay;

        proxy_pass http://portfolio_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_set_header Cookie "";
        proxy_hide_header X-Powered-By;
        proxy_connect_timeout 3s;
        proxy_send_timeout 20s;
        proxy_read_timeout 125s;
    }

    location ^~ /backend/api/v1/admin/login {
        client_max_body_size 16k;
        limit_req zone=portfolio_admin_login burst=4 nodelay;

        proxy_pass http://portfolio_backend/api/v1/admin/login;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_hide_header X-Powered-By;
        proxy_connect_timeout 3s;
        proxy_send_timeout 10s;
        proxy_read_timeout 10s;
    }

    location = /backend/api/v1/admin/content {
        client_max_body_size 3m;
        limit_conn portfolio_global_connections 128;
        limit_conn portfolio_per_ip_connections 32;
        limit_conn portfolio_large_body_global 4;
        limit_conn portfolio_large_body_per_ip 2;

        proxy_pass http://portfolio_backend/api/v1/admin/content;
        proxy_http_version 1.1;
        proxy_request_buffering off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_hide_header X-Powered-By;
        proxy_connect_timeout 3s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    location = /backend/api/v1/admin/uploads {
        # 9 MiB leaves room for multipart framing around the backend's 8 MiB file limit.
        client_max_body_size 9m;
        limit_conn portfolio_global_connections 128;
        limit_conn portfolio_per_ip_connections 32;
        limit_conn portfolio_large_body_global 4;
        limit_conn portfolio_large_body_per_ip 2;

        proxy_pass http://portfolio_backend/api/v1/admin/uploads;
        proxy_http_version 1.1;
        proxy_request_buffering off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_hide_header X-Powered-By;
        proxy_connect_timeout 3s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    location /backend/ {
        client_max_body_size 64k;

        proxy_pass http://portfolio_backend/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_hide_header X-Powered-By;
        proxy_connect_timeout 3s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    location / {
        proxy_pass http://portfolio_frontend;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_set_header Cookie "";
        proxy_hide_header X-Powered-By;
        proxy_connect_timeout 3s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }
}

server {
    listen 443 ssl;
    server_name www.beta-demo.top;
    access_log /var/log/nginx/access.log portfolio_json;

    ssl_certificate /etc/nginx/certs/beta-demo.top.pem;
    ssl_certificate_key /etc/nginx/certs/beta-demo.top.key;

    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "accelerometer=(), autoplay=(), camera=(), display-capture=(), encrypted-media=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Request-ID $request_id always;

    location / {
        set $aura_upstream http://aura-app:80;
        proxy_pass $aura_upstream;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_hide_header X-Powered-By;
        proxy_connect_timeout 3s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}

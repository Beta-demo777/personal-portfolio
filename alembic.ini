[alembic]
script_location = %(here)s/backend/alembic
prepend_sys_path = %(here)s/backend
path_separator = os

# The URL is supplied as a sqlalchemy.URL by backend/alembic/env.py. Keeping it
# out of this file prevents credentials from being committed or logged.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
